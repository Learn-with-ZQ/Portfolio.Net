<mat-sidenav-container class="layout-container">
  <mat-sidenav mode="side" [opened]="opened()" class="sidenav">
    <div class="brand">
      <mat-icon>account_circle</mat-icon>
      <span>Portfolio Admin</span>
    </div>

    <mat-nav-list>
      @for (item of navItems; track item.route) {
        <a mat-list-item [routerLink]="item.route" routerLinkActive="active">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="toolbar">
      <button mat-icon-button type="button" (click)="opened.set(!opened())">
        <mat-icon>menu</mat-icon>
      </button>
      <span>Admin Portal</span>
      <span class="spacer"></span>

      <form [formGroup]="profileForm" class="profile-form" (ngSubmit)="applyProfile()">
        <mat-form-field appearance="outline" subscriptSizing="dynamic">
          <mat-label>Profile ID</mat-label>
          <input matInput type="number" formControlName="profileId" />
        </mat-form-field>
        <button mat-stroked-button type="submit">Apply</button>
      </form>

      <button mat-button type="button" (click)="logout()">
        <mat-icon>logout</mat-icon>
        Logout
      </button>
    </mat-toolbar>

    <main class="content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
