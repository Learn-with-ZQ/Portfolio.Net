<app-page-header
  title="Skills"
  subtitle="Manage technical skills"
  actionLabel="Add Skill"
  actionLink="new"
/>

<div class="toolbar">
  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Search</mat-label>
    <input matInput (input)="onSearch($any($event.target).value)" />
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>
</div>

@if (loading()) {
  <div class="loading">
    <mat-spinner diameter="40" />
  </div>
} @else if (error()) {
  <p class="error">{{ error() }}</p>
} @else {
  <div class="table-container">
    <table mat-table [dataSource]="items()" class="mat-elevation-z2">
      <ng-container matColumnDef="skillName">
        <th mat-header-cell *matHeaderCellDef>Skill Name</th>
        <td mat-cell *matCellDef="let row">{{ row.skillName }}</td>
      </ng-container>

      <ng-container matColumnDef="detailCount">
        <th mat-header-cell *matHeaderCellDef>Details</th>
        <td mat-cell *matCellDef="let row">{{ row.detailCount }}</td>
      </ng-container>

      <ng-container matColumnDef="sortOrder">
        <th mat-header-cell *matHeaderCellDef>Sort Order</th>
        <td mat-cell *matCellDef="let row">{{ row.sortOrder }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let row">
          <a mat-icon-button [routerLink]="[row.skillId, 'edit']" aria-label="Edit">
            <mat-icon>edit</mat-icon>
          </a>
          <button mat-icon-button color="warn" (click)="deleteItem(row)" aria-label="Delete">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <mat-paginator
      [length]="totalRecords()"
      [pageSize]="pageSize()"
      [pageIndex]="pageNumber() - 1"
      [pageSizeOptions]="[5, 10, 25, 50]"
      (page)="onPage($event)"
    />
  </div>
}
