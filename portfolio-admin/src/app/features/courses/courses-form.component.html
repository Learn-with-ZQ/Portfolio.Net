@if (loading()) {
  <div class="loading">
    <mat-spinner diameter="40" />
  </div>
} @else {
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ isEdit() ? 'Edit Course' : 'New Course' }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="save()" class="form-grid">
        <mat-form-field appearance="outline">
          <mat-label>Course Name</mat-label>
          <input matInput formControlName="courseName" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Institute</mat-label>
          <mat-select formControlName="instituteId">
            <mat-option [value]="null">— None —</mat-option>
            @for (institute of institutes(); track institute.id) {
              <mat-option [value]="institute.id">{{ institute.name }}</mat-option>
            }
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Sort Order</mat-label>
          <input matInput type="number" formControlName="sortOrder" />
        </mat-form-field>
      </form>
    </mat-card-content>

    <mat-card-actions align="end">
      <button mat-button type="button" (click)="cancel()">Cancel</button>
      <button mat-flat-button color="primary" [disabled]="saving()" (click)="save()">
        @if (saving()) {
          Saving...
        } @else {
          Save
        }
      </button>
    </mat-card-actions>
  </mat-card>
}
