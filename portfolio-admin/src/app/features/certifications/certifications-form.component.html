@if (loading()) {
  <div class="loading">
    <mat-spinner diameter="40" />
  </div>
} @else {
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ isEdit() ? 'Edit Certification' : 'New Certification' }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="save()" class="form-grid">
        <mat-form-field appearance="outline">
          <mat-label>Certification Issuer</mat-label>
          <mat-select formControlName="certificationIssuerId">
            @for (issuer of issuers(); track issuer.id) {
              <mat-option [value]="issuer.id">{{ issuer.name }}</mat-option>
            }
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Certification Name</mat-label>
          <input matInput formControlName="certificationName" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Credential ID</mat-label>
          <input matInput formControlName="credentialId" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Credential URL</mat-label>
          <input matInput type="url" formControlName="credentialUrl" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Issue Date</mat-label>
          <input matInput type="date" formControlName="issueDate" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Expiry Date</mat-label>
          <input matInput type="date" formControlName="expiryDate" [disabled]="form.controls.doesNotExpire.value" />
        </mat-form-field>

        <mat-checkbox formControlName="doesNotExpire" class="checkbox-field">Does not expire</mat-checkbox>

        <mat-form-field appearance="outline">
          <mat-label>Sort Order</mat-label>
          <input matInput type="number" formControlName="sortOrder" />
        </mat-form-field>
      </form>
    </mat-card-content>

    <mat-card-actions align="end">
      <button mat-button type="button" (click)="cancel()">Cancel</button>
      <button mat-flat-button color="primary" [disabled]="saving()" (click)="save()">
        @if (saving()) {
          Saving...
        } @else {
          Save
        }
      </button>
    </mat-card-actions>
  </mat-card>
}
