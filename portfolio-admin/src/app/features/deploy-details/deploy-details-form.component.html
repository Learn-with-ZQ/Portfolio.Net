@if (loading()) {
  <div class="loading">
    <mat-spinner diameter="40" />
  </div>
} @else {
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ isEdit() ? 'Edit Deploy Detail' : 'New Deploy Detail' }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="save()" class="form-grid">
        <mat-form-field appearance="outline">
          <mat-label>Name</mat-label>
          <input matInput formControlName="deployDetailName" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Deployed To</mat-label>
          <input matInput formControlName="deployedTo" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Deployed By Company</mat-label>
          <mat-select formControlName="deployedByCompanyId">
            <mat-option [value]="null">— None —</mat-option>
            @for (company of companies(); track company.id) {
              <mat-option [value]="company.id">{{ company.name }}</mat-option>
            }
          </mat-select>
        </mat-form-field>
      </form>
    </mat-card-content>

    <mat-card-actions align="end">
      <button mat-button type="button" (click)="cancel()">Cancel</button>
      <button mat-flat-button color="primary" [disabled]="saving()" (click)="save()">
        @if (saving()) {
          Saving...
        } @else {
          Save
        }
      </button>
    </mat-card-actions>
  </mat-card>
}
